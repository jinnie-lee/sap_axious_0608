<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 공장 MBTI | SAP Manufacturing AX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --text: #1a1a18;
    --text-muted: #6b6860;
    --text-faint: #a09e9a;
    --accent: #1a4fd6;
    --accent-light: #e8eefb;
    --border: rgba(26,26,24,0.1);
    --border-strong: rgba(26,26,24,0.18);
    --success: #0f6e56;
    --success-light: #e1f5ee;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'IBM Plex Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 4rem;
  }

  .container {
    width: 100%;
    max-width: 560px;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }
  .topbar-logo {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .08em;
    color: var(--text-faint);
  }
  .topbar-tag {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-light);
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: .04em;
  }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ─── START ─── */
  .start-hero {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 2.5rem 2rem 2rem;
    margin-bottom: 1rem;
    text-align: center;
  }
  .start-icon {
    font-size: 48px;
    margin-bottom: 1rem;
    display: block;
  }
  .start-hero h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -.02em;
    margin-bottom: .5rem;
    line-height: 1.3;
  }
  .start-hero p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 1.5rem;
  }
  .start-meta {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: .5rem;
    margin-bottom: 1.5rem;
  }
  .meta-chip {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: .6rem .5rem;
    text-align: center;
  }
  .meta-chip .mc-n {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    display: block;
    font-family: 'Space Mono', monospace;
  }
  .meta-chip .mc-l {
    font-size: 11px;
    color: var(--text-muted);
    display: block;
    margin-top: 2px;
  }
  .btn-primary {
    display: block;
    width: 100%;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: .85rem 1.5rem;
    font-size: 15px;
    font-weight: 500;
    font-family: 'IBM Plex Sans KR', sans-serif;
    cursor: pointer;
    letter-spacing: -.01em;
    transition: opacity .15s, transform .1s;
  }
  .btn-primary:hover { opacity: .85; }
  .btn-primary:active { transform: scale(.98); }
  .start-disclaimer {
    font-size: 12px;
    color: var(--text-faint);
    text-align: center;
    margin-top: .75rem;
  }

  /* ─── QUIZ ─── */
  .quiz-header {
    margin-bottom: 1.25rem;
  }
  .progress-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: .5rem;
  }
  .progress-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
  }
  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .4s ease;
  }
  .quiz-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 1.75rem 1.5rem;
    margin-bottom: .75rem;
  }
  .q-domain {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .06em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: .6rem;
  }
  .q-text {
    font-size: 17px;
    font-weight: 500;
    line-height: 1.55;
    color: var(--text);
    letter-spacing: -.01em;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: .5rem;
  }
  .opt-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: .9rem 1rem;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: .75rem;
    transition: all .15s;
    font-family: 'IBM Plex Sans KR', sans-serif;
  }
  .opt-btn:hover {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .opt-btn:active { transform: scale(.99); }
  .opt-key {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    margin-top: 1px;
  }
  .opt-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.55;
  }
  .opt-hint {
    font-size: 12px;
    color: var(--text-faint);
    margin-top: .25rem;
  }

  /* ─── RESULT ─── */
  .result-hero {
    background: var(--text);
    border-radius: var(--radius);
    padding: 2rem 1.5rem;
    margin-bottom: .75rem;
    text-align: center;
    color: #fff;
  }
  .r-emoji { font-size: 44px; margin-bottom: .75rem; display: block; }
  .r-code {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .15em;
    color: rgba(255,255,255,.5);
    margin-bottom: .3rem;
  }
  .r-name {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -.02em;
    margin-bottom: .75rem;
    line-height: 1.3;
  }
  .r-desc {
    font-size: 13px;
    color: rgba(255,255,255,.72);
    line-height: 1.7;
    text-align: left;
    background: rgba(255,255,255,.07);
    border-radius: var(--radius-sm);
    padding: .85rem 1rem;
  }
  .result-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.25rem 1rem;
    margin-bottom: .75rem;
  }
  .sec-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .dim-row {
    display: flex;
    align-items: center;
    gap: .75rem;
    margin-bottom: .55rem;
  }
  .dim-label {
    font-size: 12px;
    color: var(--text-muted);
    width: 64px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .dim-track {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .dim-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--accent);
    transition: width .6s ease;
  }
  .dim-val {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }
  .sol-item {
    display: flex;
    gap: .75rem;
    padding: .7rem 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .sol-item:last-child { border-bottom: none; padding-bottom: 0; }
  .sol-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 2px;
    width: 18px;
  }
  .sol-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
  }
  .sol-why {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .cta-box {
    background: var(--success-light);
    border-radius: var(--radius-sm);
    padding: .9rem 1rem;
    font-size: 13px;
    color: var(--success);
    line-height: 1.6;
    margin-bottom: .75rem;
  }
  .cta-box strong { font-weight: 600; }
  .btn-ghost {
    display: block;
    width: 100%;
    background: transparent;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: .75rem;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'IBM Plex Sans KR', sans-serif;
    transition: all .15s;
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
</style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <span class="topbar-logo">SAP · AX TEAM</span>
    <span class="topbar-tag">Manufacturing Assessment</span>
  </div>

  <!-- START -->
  <div id="start" class="screen active">
    <div class="start-hero">
      <span class="start-icon">🏭</span>
      <h1>우리 공장 MBTI는?</h1>
      <p>10문항으로 알아보는<br>Autonomous Manufacturing 성숙도 진단</p>
      <div class="start-meta">
        <div class="meta-chip">
          <span class="mc-n">10</span>
          <span class="mc-l">문항</span>
        </div>
        <div class="meta-chip">
          <span class="mc-n">3분</span>
          <span class="mc-l">소요</span>
        </div>
        <div class="meta-chip">
          <span class="mc-n">6가지</span>
          <span class="mc-l">공장 유형</span>
        </div>
      </div>
      <button class="btn-primary" onclick="startQuiz()">진단 시작하기 →</button>
    </div>
    <p class="start-disclaimer">SAP Manufacturing AX팀 | 내부 고객 가치 진단 도구 (초안)</p>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="screen">
    <div class="quiz-header">
      <div class="progress-row">
        <span class="progress-label" id="qlabel">01 / 10</span>
        <span class="progress-label" id="qpct">10%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="pbar" style="width:10%"></div>
      </div>
    </div>
    <div class="quiz-card">
      <div class="q-domain" id="qdomain"></div>
      <div class="q-text" id="qtext"></div>
    </div>
    <div class="options" id="opts"></div>
  </div>

  <!-- RESULT -->
  <div id="result" class="screen">
    <div class="result-hero">
      <span class="r-emoji" id="r-emoji"></span>
      <div class="r-code" id="r-code"></div>
      <div class="r-name" id="r-name"></div>
      <div class="r-desc" id="r-desc"></div>
    </div>

    <div class="result-section">
      <div class="sec-title">성숙도 프로파일</div>
      <div id="dim-bars"></div>
    </div>

    <div class="result-section">
      <div class="sec-title">추천 SAP 솔루션</div>
      <div id="sol-list"></div>
    </div>

    <div class="cta-box" id="cta-box"></div>
    <button class="btn-ghost" onclick="restart()">↺ 다시 진단하기</button>
  </div>

</div>

<script>
const questions = [
  {
    domain: "데이터 · 디지털화",
    text: "생산 현장의 데이터 수집은 어떻게 이루어지나요?",
    opts: [
      { t: "A", l: "작업자가 종이에 기록하거나 수작업으로 ERP에 입력해요", s: {D:-2, I:-1} },
      { t: "B", l: "일부 설비는 자동 수집되지만 나머지는 수동이에요", s: {D:0, I:0} },
      { t: "C", l: "대부분 MES/IoT로 실시간 자동 수집돼요", s: {D:2, I:1} }
    ]
  },
  {
    domain: "설비 지능화",
    text: "설비 이상 징후를 어떻게 감지하나요?",
    opts: [
      { t: "A", l: "작업자가 소리나 진동으로 느낄 때 알아요 (경험 의존)", s: {I:-2, Q:-1} },
      { t: "B", l: "알람이 울리면 확인하러 가요 (사후 대응)", s: {I:-1, Q:0} },
      { t: "C", l: "AI/ML 기반 예측 정비 시스템이 미리 알려줘요", s: {I:2, Q:1} }
    ]
  },
  {
    domain: "품질 자율화",
    text: "불량이 발생하면 원인 파악까지 얼마나 걸리나요?",
    opts: [
      { t: "A", l: "며칠 ~ 몇 주... 회의를 여러 번 해야 해요", s: {Q:-2, D:-1} },
      { t: "B", l: "SPC 차트 보면서 수작업으로 찾아요 (반나절~하루)", s: {Q:0, D:0} },
      { t: "C", l: "디지털 품질 추적으로 즉시 공정 추적해요", s: {Q:2, D:1} }
    ]
  },
  {
    domain: "공급망 가시성",
    text: "공급망 변동(납기 지연, 자재 부족)에 어떻게 대응하나요?",
    opts: [
      { t: "A", l: "전화·이메일로 수동 확인하고 스프레드시트로 정리해요", s: {S:-2, A:-1} },
      { t: "B", l: "ERP 알림이 오면 담당자가 수동으로 조정해요", s: {S:0, A:0} },
      { t: "C", l: "SCM 시스템이 자동으로 대안 공급처나 일정을 제안해요", s: {S:2, A:1} }
    ]
  },
  {
    domain: "자율 계획",
    text: "생산 계획 변경이 생기면 어떻게 조정하나요?",
    opts: [
      { t: "A", l: "계획팀이 수작업으로 다시 짜요 (몇 시간 소요)", s: {A:-2, D:-1} },
      { t: "B", l: "시뮬레이션 없이 경험으로 조정해요", s: {A:-1, S:0} },
      { t: "C", l: "AI 스케줄러가 실시간으로 최적 계획을 재수립해요", s: {A:2, S:1} }
    ]
  },
  {
    domain: "설계 연계",
    text: "제품 설계 변경 사항이 현장에 반영되는 속도는?",
    opts: [
      { t: "A", l: "ECO 프로세스가 몇 주씩 걸려요 (도면 출력 → 배포)", s: {E:-2, Q:-1} },
      { t: "B", l: "PLM은 있는데 현장 연계가 약해요", s: {E:0, D:0} },
      { t: "C", l: "PLM-ERP-MES 연계로 설계 변경이 즉시 현장에 반영돼요", s: {E:2, A:1} }
    ]
  },
  {
    domain: "지속가능성 · ESG",
    text: "탄소 배출량·에너지 사용량을 추적하고 있나요?",
    opts: [
      { t: "A", l: "측정 자체가 안 돼요... ESG 보고서 쓰기 힘들어요", s: {E:-1, S:-2} },
      { t: "B", l: "엑셀로 집계하는데 실시간 데이터는 없어요", s: {E:0, S:0} },
      { t: "C", l: "공정별 탄소 발자국 자동 추적 + 규제 리포팅해요", s: {E:1, S:2} }
    ]
  },
  {
    domain: "경영 가시성",
    text: "공장 운영 KPI를 경영진이 얼마나 빨리 확인할 수 있나요?",
    opts: [
      { t: "A", l: "월말 보고서 때요 (보고서 만드는 데 3일 걸려요)", s: {I:-2, A:-1} },
      { t: "B", l: "주간 대시보드를 수작업으로 업데이트해요", s: {I:-1, D:0} },
      { t: "C", l: "실시간 대시보드로 언제든 드릴다운 가능해요", s: {I:2, E:1} }

  },
  {
    domain: "디지털 트윈",
    text: "공장 내 디지털 트윈(가상 공장)을 활용하고 있나요?",
    opts: [
      { t: "A", l: "그게 뭔지는 알겠는데 도입은 꿈도 못 꿔요", s: {D:-2, I:-1} },
      { t: "B", l: "3D 도면은 있는데 실시간 연동은 없어요", s: {D:0, E:0} },
      { t: "C", l: "설비/공정 디지털 트윈으로 가상 시뮬레이션해요", s: {D:2, A:1} }
    ]
  },
  {
    domain: "DX 방향성",
    text: "우리 회사의 제조 자율화 추진 방향은?",
    opts: [
      { t: "A", l: "당장 현장 문제 해결이 급해요 (ERP 데이터도 엉망)", s: {A:-2, D:-2} },
      { t: "B", l: "특정 영역(품질/설비)부터 단계적으로 스마트화 중이에요", s: {A:0, Q:1} },
      { t: "C", l: "전사 디지털 트랜스포메이션 전략이 수립됐어요", s: {A:2, S:1} }
    ]
  }
];

const dimMeta = {
  D: "데이터",
  I: "설비지능화",
  Q: "품질자율화",
  S: "공급망",
  A: "자율계획",
  E: "설계·ESG"
};

const types = {
  PIONEER: {
    emoji: "🚀", code: "PIONEER", name: "자율화 개척자",
    desc: "축하해요! 귀사 공장은 Autonomous Manufacturing의 최전선에 있어요. 데이터, 설비, 품질, 공급망이 유기적으로 연결되어 스스로 판단하고 최적화하는 수준에 근접했습니다.",
    sols: [
      { name: "SAP Predictive Asset Insights", why: "설비 자율 예측 정비로 다음 단계 도약" },
      { name: "SAP Digital Manufacturing", why: "MES-ERP 완전 통합으로 자율 생산 실현" },
      { name: "SAP Sustainability Control Tower", why: "ESG 자율 추적으로 규제 선제 대응" }
    ],
    cta: "💡 귀사는 SAP Manufacturing Reference Customer 후보입니다. AX팀과 함께 글로벌 레퍼런스를 만들어 보세요."
  },

let scores = {D:0, I:0, Q:0, S:0, A:0, E:0};
let qi = 0;

function startQuiz() {
  show("quiz");
  renderQ();
}

function renderQ() {
  const q = questions[qi];
  const pct = Math.round(((qi+1) / questions.length) * 100);
  document.getElementById("qlabel").textContent = String(qi+1).padStart(2,"0") + " / " + questions.length;
  document.getElementById("qpct").textContent = pct + "%";
  document.getElementById("pbar").style.width = pct + "%";
  document.getElementById("qdomain").textContent = q.domain;
  document.getElementById("qtext").textContent = q.text;

  const opts = document.getElementById("opts");
  opts.innerHTML = "";
  q.opts.forEach(o => {
    const b = document.createElement("button");
    b.className = "opt-btn";
    b.innerHTML = `<span class="opt-key">${o.t}</span><span class="opt-text">${o.l}</span>`;
    b.onclick = () => pick(o.s);
    opts.appendChild(b);
  });
}

function pick(s) {
  Object.entries(s).forEach(([k, v]) => { scores[k] = (scores[k] || 0) + v; });
  qi++;
  if (qi >= questions.length) showResult();
  else renderQ();
}

function classify() {
  const vals = Object.values(scores);
  const total = vals.reduce((a,b) => a+b, 0);
  const avg = total / 6;
  const highs = vals.filter(v => v >= 2).length;
  if (avg >= 3) return "PIONEER";
  if (avg >= 1 && highs >= 4) return "ACHIEVER";
  if (avg >= 1) return "SPECIALIST";
  if (scores.A >= 2 && avg < 1) return "DREAMER";
  if (scores.D <= -1 && scores.I <= -1) return "SURVIVOR";
  return "ISOLATIONIST";
}

function showResult() {
  show("result");
  const key = classify();
  const t = types[key];

  document.getElementById("r-emoji").textContent = t.emoji;
  document.getElementById("r-code").textContent = "공장 유형 · " + t.code;
  document.getElementById("r-name").textContent = t.name;
  document.getElementById("r-desc").textContent = t.desc;

  const MAX = 4;
  const bars = document.getElementById("dim-bars");
  bars.innerHTML = "";
  Object.entries(scores).forEach(([k, v]) => {
    const pct = Math.max(4, Math.min(100, Math.round((v + MAX) / (MAX * 2) * 100)));
    const sign = v > 0 ? "+" + v : String(v);
    bars.innerHTML += `<div class="dim-row">
      <span class="dim-label">${dimMeta[k]}</span>
      <div class="dim-track"><div class="dim-fill" style="width:${pct}%"></div></div>
      <span class="dim-val">${sign}</span>
    </div>`;
  });

  const sl = document.getElementById("sol-list");
  sl.innerHTML = "";
  t.sols.forEach((s, i) => {
    sl.innerHTML += `<div class="sol-item">
      <span class="sol-num">0${i+1}</span>
      <div><div class="sol-name">${s.name}</div><div class="sol-why">${s.why}</div></div>
    </div>`;
  });

  document.getElementById("cta-box").textContent = t.cta;
}

function restart() {
  scores = {D:0, I:0, Q:0, S:0, A:0, E:0};
  qi = 0;
  show("start");
}

function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>
